version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: test-rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI port
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    networks:
      - test-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  multi-client-tests:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multi-client-tests
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - test-network
    volumes:
      - ../shared:/app/shared:ro
    environment:
      - GO111MODULE=on
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=admin
      - RABBITMQ_PASS=password
    command: ["./run_multi_client_test.sh"]
    working_dir: /app

networks:
  test-network:
    driver: bridge

